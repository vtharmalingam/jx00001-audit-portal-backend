services:

  # ── FastAPI backend ──────────────────────────────────────
  api:
    build: .
    container_name: audit-api
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    volumes:
      - ./app:/app/app            # live-reload in dev
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    restart: unless-stopped

  # ── Celery worker (gap analysis) ─────────────────────────
  celery-worker:
    build: .
    container_name: audit-celery-worker
    env_file: .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    volumes:
      - ./app:/app/app
    depends_on:
      redis:
        condition: service_healthy
    #  the celery-worker service started
    command: celery -A app.pipeline.celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped

  # ── Redis (Celery broker + result backend) ───────────────
  redis:
    image: redis:7-alpine
    container_name: audit-redis
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Redis UI (browser-based) ──────────────────────────────
  redis-ui:
    image: redis/redisinsight:latest
    container_name: audit-redis-ui
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
